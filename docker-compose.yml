services:

  # ── Streamlit UI ──────────────────────────────────────────────────────────
  biotech-app:
    build: .
    container_name: biotech-app
    command: streamlit run app/main.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
      - ./output:/app/output          # bind-mount for developer visibility
    env_file: .env
    environment:
      - DB_PATH=/app/biotech_tracker.db
      - OUTPUT_DIR=/app/output
      - OLLAMA_HOST_GPU0=http://ollama-gpu0:11434
      - OLLAMA_HOST_GPU1=http://ollama-gpu1:11434
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
    depends_on:
      - chromadb
    restart: unless-stopped

  # ── APScheduler (ingestion + crew automation) ─────────────────────────────
  scheduler:
    build: .
    container_name: scheduler
    command: python scripts/scheduler.py
    volumes:
      - .:/app
      - ./output:/app/output
    env_file: .env
    environment:
      - DB_PATH=/app/biotech_tracker.db
      - OUTPUT_DIR=/app/output
      - OLLAMA_HOST_GPU0=http://ollama-gpu0:11434
      - OLLAMA_HOST_GPU1=http://ollama-gpu1:11434
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
    depends_on:
      - chromadb
    restart: unless-stopped

  # ── Nginx reverse proxy (Phase 4 — Week 12) ──────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - biotech-app
    restart: unless-stopped

  # ── ChromaDB local vector store ───────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  # ── Ollama GPU 0 (Tesla P4 #1) ────────────────────────────────────────────
  # Skipped on ThinkPad — start with: docker-compose --profile gpu up
  ollama-gpu0:
    image: ollama/ollama:latest
    container_name: ollama-gpu0
    profiles: ["gpu"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_models_gpu0:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    restart: unless-stopped

  # ── Ollama GPU 1 (Tesla P4 #2) ────────────────────────────────────────────
  ollama-gpu1:
    image: ollama/ollama:latest
    container_name: ollama-gpu1
    profiles: ["gpu"]
    ports:
      - "11435:11434"
    volumes:
      - ollama_models_gpu1:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  chroma_data:
  ollama_models_gpu0:
  ollama_models_gpu1:
